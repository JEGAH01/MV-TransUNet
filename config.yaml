# ============================================================
# MV-TransUNet Configuration File
# Boundary-Aware Hybrid CNN-Vision Transformer
# Retinal Vessel Segmentation Framework
#
# Experiment:
# Patch-based training (256x256 patches, vessel-centred
# oversampling), Focal Tversky + Boundary + clDice joint loss,
# ReduceLROnPlateau scheduler on validation Dice.
#
# NOTE: this is NOT the 512x512 whole-image experiment from the
# original roadmap -- patch_training.patch_size /
# model_input_size are both 256. preprocessing.image_size below
# is retained only as a fallback for non-patch (whole-image)
# ablation runs; it is not the resolution used here.
#
# Training Platform:
# Google Colab Pro GPU — NVIDIA A100
# ============================================================

# ============================================================
# PATCH-BASED TRAINING
# ============================================================

patch_training:
  enabled: true

  patch_size: 256
  model_input_size: 256
  patches_per_image: 100
  validation_stride: 128

  vessel_center_probability: 0.60
  hard_negative_probability: 0.25
  random_probability: 0.15

  minimum_vessel_fraction: 0.01

  hard_negative_max_vessel_fraction: 0.005
  hard_negative_candidates: 20

  max_sampling_attempts: 20
  include_empty_validation_patches: true

# ============================================================
# PROJECT INFORMATION
# ============================================================

project:
  name: "MV-TransUNet"
  version: "2.1"
  task: "retinal_vessel_segmentation"

  description: >
    Boundary-aware hybrid CNN-Vision Transformer framework
    for retinal vessel segmentation, using high-resolution
    512x512 inputs, vessel attention, multi-scale decoding,
    reduced deep supervision, and explicit boundary learning.


# ============================================================
# RANDOMNESS AND REPRODUCIBILITY
# ============================================================

seed:
  value: 42
  deterministic: true


# ============================================================
# HARDWARE CONFIGURATION
# ============================================================

hardware:
  device: "cuda"
  gpu_id: 0
  accelerator: "google_colab"
  gpu_type: "NVIDIA A100"

  mixed_precision: true

  # Keep false for reproducible experiments.
  # Your train.py also enforces deterministic cuDNN behavior.
  cudnn_benchmark: false


# ============================================================
# DATASET CONFIGURATION
# ============================================================

dataset:
  name: "DRIVE"

  raw_root_dir: "/content/MV-TransUNet/datasets"
  processed_root_dir: "/content/MV-TransUNet/datasets_processed"

  # Official DRIVE development protocol:
  # 20 official training images
  # 16 training images
  # 4 validation images
  validation_ratio: 0.2

  split_seed: 42

  # DRIVE_train / DRIVE_test are SEPARATE folders, verified against
  # the actual raw dataset (training/ vessel masks at 1st_manual/,
  # NOT masks/, which is the FOV circle -- same for test/). Produced
  # by the corrected prepare_datasets.py. Both confirmed via the
  # sanity check: DRIVE_train foreground fraction 0.075, DRIVE_test
  # foreground fraction 0.089 -- both plausible vessel densities.
  train_dataset:
    name: "DRIVE"

    image_dir: "/content/MV-TransUNet/datasets_processed/DRIVE_train/images"
    mask_dir: "/content/MV-TransUNet/datasets_processed/DRIVE_train/masks"

  # The ONLY dataset evaluate.py's DRIVE_test evaluation should
  # touch for the headline reported number. Never referenced by
  # train.py -- never used for the train/validation split, patch
  # extraction, or checkpoint selection.
  test_dataset:
    name: "DRIVE"

    image_dir: "/content/MV-TransUNet/datasets_processed/DRIVE_test/images"
    mask_dir: "/content/MV-TransUNet/datasets_processed/DRIVE_test/masks"

  # Additional datasets are reserved for cross-dataset testing.
  external_datasets:

    STARE:
      image_dir: >
        /content/MV-TransUNet/datasets_processed/STARE/images

      mask_dir: >
        /content/MV-TransUNet/datasets_processed/STARE/masks

    CHASE_DB1:
      image_dir: >
        /content/MV-TransUNet/datasets_processed/CHASE_DB1/images

      mask_dir: >
        /content/MV-TransUNet/datasets_processed/CHASE_DB1/masks

    HRF:
      image_dir: >
        /content/MV-TransUNet/datasets_processed/HRF/images

      mask_dir: >
        /content/MV-TransUNet/datasets_processed/HRF/masks


# ============================================================
# IMAGE PREPROCESSING
# ============================================================

preprocessing:
  # Used only when patch_training.enabled is false (whole-image
  # build_dataloaders path). With patch training enabled, the
  # active resolution is patch_training.model_input_size (256),
  # not this value.
  image_size:
    height: 512
    width: 512

  channels: 3

  clahe:
    enabled: true
    clip_limit: 2.0
    tile_grid_size: 8

  normalization:
    enabled: true

    mean:
      - 0.485
      - 0.456
      - 0.406

    std:
      - 0.229
      - 0.224
      - 0.225


# ============================================================
# DATA AUGMENTATION
# ============================================================

augmentation:
  enabled: true

  horizontal_flip:
    enabled: true
    probability: 0.5

  vertical_flip:
    enabled: true
    probability: 0.5

  rotation:
    enabled: true
    limit: 30
    probability: 0.5

  elastic_transform:
    enabled: true
    alpha: 120
    sigma: 6
    probability: 0.3

  brightness_contrast:
    enabled: true
    probability: 0.5


# ============================================================
# DATALOADER CONFIGURATION
# ============================================================

dataloader:
  # Start safely at batch size 4 for 512x512 deep supervision.
  # Effective batch size = 4 x 2 accumulation steps = 8.
  batch_size: 4

  num_workers: 2

  pin_memory: true

  shuffle: true

  drop_last: false

  persistent_workers: false


# ============================================================
# MODEL CONFIGURATION
# ============================================================

model:
  name: "MV-TransUNet"

  input_channels: 3

  output_channels: 1

  backbone:
    encoder: "resnet50"
    pretrained: true

  transformer:
    name: "ViT-B_16"

    image_size: 512

    patch_size: 16

    embed_dim: 768

    depth: 12

    heads: 12

    mlp_dim: 3072

    dropout: 0.1

  vessel_attention:
    enabled: true

    reduction_ratio: 16

  decoder:
    type: "multi_scale_progressive"

    boundary_attention: true

    use_skip_connections: true

    channels:
      - 512
      - 256
      - 128
      - 64

    # Spatial (channel) dropout applied inside each decoder
    # ConvBlock (decoder1/2/3), NOT in the segmentation heads.
    # Added in direct response to an observed train/validation Dice
    # gap (~0.85 train vs. ~0.78 val on a 16-image split). Set to
    # 0.0 to exactly reproduce prior (undropped) runs -- e.g. for a
    # clean before/after ablation comparison.
    dropout_rate: 0.1

  deep_supervision:
    enabled: true


# ============================================================
# LOSS CONFIGURATION
# ============================================================

loss:
  name: "MVTransUNetLoss"

  # Joint loss (Experiment B):
  # 0.5 Focal Tversky + 0.3 Boundary + 0.2 clDice
  #
  # Previously this key was declared twice (0.3, then a leftover
  # 0.2 from the old BCE/Dice/Boundary schema further down). YAML
  # silently keeps the LAST occurrence, so every prior run using
  # this file actually trained with boundary_weight=0.2, not 0.3.
  # Fixed here -- there is now exactly one boundary_weight key.
  focal_tversky_weight: 0.5
  boundary_weight: 0.3
  cldice_weight: 0.2

  # NOTE: auxiliary_weights below are still the ORIGINAL,
  # un-reduced values from the 256x256 baseline experiment
  # (0.10, 0.20, 0.30). The reduced values planned for the
  # 512x512 experiment (0.05, 0.10, 0.15) were never applied to
  # this run. Change these explicitly if you want the reduction
  # -- do not rely on a comment that no longer matches the file.
  auxiliary_weights:
    - 0.10
    - 0.20
    - 0.30

  boundary_loss:
    type: "laplacian_boundary"

    kernel_size: 3


# ============================================================
# OPTIMIZER CONFIGURATION
# ============================================================

optimizer:
  name: "AdamW"

  learning_rate: 0.0001

  weight_decay: 0.0001

  betas:
    - 0.9
    - 0.999

  epsilon: 0.00000001


# ============================================================
# LEARNING RATE SCHEDULER
# ============================================================
#
# ReduceLROnPlateau on validation Dice (mode="max"), NOT
# CosineAnnealingLR. A fixed-epoch cosine schedule assumes the
# full `training.epochs` budget is always reached; with early
# stopping enabled this is frequently false, which starves the
# run of its low-LR fine-tuning phase. See train.py for details.
#
# scheduler.patience is intentionally shorter than
# training.early_stopping.patience so LR gets reduced at least
# once (ideally twice) before early stopping can fire.

scheduler:
  name: "ReduceLROnPlateau"

  factor: 0.5

  patience: 8

  threshold: 0.0001

  min_lr: 0.000001


# ============================================================
# TRAINING CONFIGURATION
# ============================================================

training:
  epochs: 150

  # Batch size 4 x accumulation 2 = effective batch size 8.
  gradient_accumulation_steps: 2

  gradient_clipping:
    enabled: true

    max_norm: 1.0

  early_stopping:
    enabled: true

    patience: 20


# ============================================================
# VALIDATION CONFIGURATION
# ============================================================

validation:
  frequency: 1

  metric:
    name: "dice"

    mode: "max"

  threshold: 0.5


# ============================================================
# CHECKPOINT CONFIGURATION
# ============================================================

checkpoint:
  directory: "/content/MV-TransUNet/checkpoints/drive_patch_256"

  # This is a new architecture/training experiment.
  # Do not load checkpoints from the previous 256x256 run.
  resume: false

  save_last: true

  save_best: true

  save_best_only: false

  best_model_name: "best_model.pth"

  last_model_name: "last_model.pth"


# ============================================================
# LOGGING CONFIGURATION
# ============================================================

logging:
  # Separate subfolder from checkpoint.directory -- previously
  # identical, which mixed TensorBoard event files with .pth
  # checkpoint files in the same listing.
  directory: "/content/MV-TransUNet/logs/drive_patch_256"

  tensorboard:
    enabled: true

  log_learning_rate: true

  log_loss_components: true


# ============================================================
# EVALUATION CONFIGURATION
# ============================================================

evaluation:
  threshold: 0.5

  metrics:
    - dice
    - sensitivity
    - specificity
    - accuracy
    - auc
    - thin_vessel_dice

  thin_vessel_analysis:
    enabled: true

    skeletonization: true

    width_threshold_pixels: 3

  save_predictions: true

  prediction_directory: "/content/MV-TransUNet/experiments/drive_patch_256/predictions"


# ============================================================
# EXPERIMENT MANAGEMENT
# ============================================================

experiment:
  name: "MVTransUNet_DRIVE_Patch256_FocalTversky_clDice"

  output_directory: "/content/MV-TransUNet/experiments/drive_patch_256"

  description: >
    Patch-based DRIVE experiment: 256x256 vessel-centred patches
    (patch_training.enabled), a fixed 80/20 image-level
    development split, Focal Tversky + Boundary + clDice joint
    loss, mixed-precision training, batch size 4, gradient
    accumulation of 2, ReduceLROnPlateau on validation Dice, and
    an NVIDIA A100 GPU. Supersedes the earlier 512x512 whole-image
    plan, which was not run with this configuration.