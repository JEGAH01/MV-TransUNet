# ============================================================
# MV-TransUNet Configuration
# Official DRIVE Experiment C
#
# Boundary-Aware Hybrid CNN-Vision Transformer
# Retinal Vessel Segmentation Framework
#
# Training Platform:
# Google Colab NVIDIA A100
# ============================================================


# ============================================================
# PROJECT INFORMATION
# ============================================================

project:

  name: "MV-TransUNet"

  version: "1.0"

  task: "retinal_vessel_segmentation"

  description: >
    Boundary-aware hybrid CNN-Vision Transformer framework
    for retinal vessel segmentation using official DRIVE
    training protocol, patch-based learning, vessel-centred
    sampling, hard-negative mining, vessel attention,
    multi-scale decoding, deep supervision, and topology-aware
    loss optimization.



# ============================================================
# RANDOMNESS
# ============================================================

seed:

  value: 42

  deterministic: true



# ============================================================
# HARDWARE
# ============================================================

hardware:

  device: "cuda"

  gpu_id: 0

  accelerator: "google_colab"

  gpu_type: "NVIDIA A100"

  mixed_precision: true

  cudnn_benchmark: true



# ============================================================
# DATASET CONFIGURATION
# OFFICIAL DRIVE PROTOCOL
# ============================================================

dataset:

  name: "DRIVE_official"


  raw_root_dir:

    "/content/MV-TransUNet/datasets"



  processed_root_dir:

    "/content/MV-TransUNet/datasets_processed"



  # IMPORTANT:
  # No random split of DRIVE test images.
  # DRIVE_train and DRIVE_test remain separated.

  validation_ratio: 0.2

  split_seed: 42



  # --------------------------------------------------------
  # OFFICIAL TRAINING SET
  # 20 images
  # --------------------------------------------------------

  train_dataset:

    name: "DRIVE_train"


    image_dir:

      "/content/MV-TransUNet/datasets_processed/DRIVE_train/images"


    mask_dir:

      "/content/MV-TransUNet/datasets_processed/DRIVE_train/masks"




  # --------------------------------------------------------
  # OFFICIAL TEST SET
  # 20 images
  # NEVER USED DURING TRAINING
  # --------------------------------------------------------

  test_dataset:

    name: "DRIVE_test"


    image_dir:

      "/content/MV-TransUNet/datasets_processed/DRIVE_test/images"


    mask_dir:

      "/content/MV-TransUNet/datasets_processed/DRIVE_test/masks"




  # --------------------------------------------------------
  # External Generalization Datasets
  # --------------------------------------------------------

  external_datasets:


    STARE:

      image_dir:

        "/content/MV-TransUNet/datasets_processed/STARE/images"


      mask_dir:

        "/content/MV-TransUNet/datasets_processed/STARE/masks"



    CHASE_DB1:

      image_dir:

        "/content/MV-TransUNet/datasets_processed/CHASE_DB1/images"


      mask_dir:

        "/content/MV-TransUNet/datasets_processed/CHASE_DB1/masks"



    HRF:

      image_dir:

        "/content/MV-TransUNet/datasets_processed/HRF/images"


      mask_dir:

        "/content/MV-TransUNet/datasets_processed/HRF/masks"





# ============================================================
# PREPROCESSING
# ============================================================

preprocessing:


  image_size:

    height: 256

    width: 256


  channels: 3



  clahe:

    enabled: true

    clip_limit: 2.0

    tile_grid_size: 8



  normalization:

    enabled: true


    mean:

      - 0.485

      - 0.456

      - 0.406


    std:

      - 0.229

      - 0.224

      - 0.225





# ============================================================
# PATCH TRAINING
# ============================================================

patch_training:


  enabled: true


  patch_size: 256


  model_input_size: 256


  patches_per_image: 100



  # Sampling strategy

  vessel_center_probability: 0.60


  hard_negative_probability: 0.25


  random_probability: 0.15



  minimum_vessel_fraction: 0.01


  hard_negative_max_vessel_fraction: 0.005


  hard_negative_candidates: 20


  max_sampling_attempts: 20



  validation_stride: 128


  include_empty_validation_patches: true





# ============================================================
# AUGMENTATION
# ============================================================

augmentation:


  enabled: true


  horizontal_flip:

    enabled: true

    probability: 0.5



  vertical_flip:

    enabled: true

    probability: 0.5



  rotation:

    enabled: true

    limit: 30

    probability: 0.5



  elastic_transform:

    enabled: true

    alpha: 120

    sigma: 6

    probability: 0.3



  brightness_contrast:

    enabled: true

    probability: 0.5





# ============================================================
# DATALOADER
# ============================================================

dataloader:


  batch_size: 4


  num_workers: 4


  pin_memory: true


  shuffle: true


  drop_last: false


  persistent_workers: true





# ============================================================
# MODEL
# ============================================================

model:


  name: "MV-TransUNet"



  input_channels: 3


  output_channels: 1



  backbone:

    encoder: "resnet50"

    pretrained: true



  transformer:

    name: "ViT-B_16"

    image_size: 256

    patch_size: 16

    embed_dim: 768

    depth: 12

    heads: 12

    mlp_dim: 3072

    dropout: 0.1



  vessel_attention:

    enabled: true

    reduction_ratio: 16



  decoder:

    type: "multi_scale_progressive"

    boundary_attention: true

    use_skip_connections: true



  deep_supervision:

    enabled: true





# ============================================================
# LOSS
# ============================================================

loss:


  name: "Experiment_C_Loss"


  focal_tversky_weight: 0.5


  boundary_weight: 0.3


  cldice_weight: 0.2



  focal_tversky:

    alpha: 0.7

    beta: 0.3

    gamma: 0.75



  boundary_loss:

    type: "laplacian_boundary"

    kernel_size: 3



  cldice:

    enabled: true



  auxiliary_weights:

    - 0.10

    - 0.20

    - 0.30





# ============================================================
# OPTIMIZER
# ============================================================

optimizer:


  name: "AdamW"


  learning_rate:

    0.0001


  weight_decay:

    0.0001


  betas:

    - 0.9

    - 0.999





# ============================================================
# LR SCHEDULER
# ============================================================

scheduler:


  name: "ReduceLROnPlateau"


  mode: "max"


  factor: 0.5


  patience: 8


  min_lr: 0.000001





# ============================================================
# TRAINING
# ============================================================

training:


  epochs: 150


  gradient_accumulation_steps: 2



  gradient_clipping:

    enabled: true

    max_norm: 1.0



  early_stopping:

    enabled: true

    patience: 20





# ============================================================
# CHECKPOINT
# ============================================================

checkpoint:


  directory:

    "/content/MV-TransUNet/checkpoints/DRIVE_official_experiment_C"



  resume: false


  save_best: true


  save_last: true



  best_model_name:

    "best_model.pth"





# ============================================================
# LOGGING
# ============================================================

logging:


  directory:

    "/content/MV-TransUNet/logs/DRIVE_official_experiment_C"



  tensorboard:

    enabled: true



  log_learning_rate: true


  log_loss_components: true





# ============================================================
# EVALUATION
# ============================================================

evaluation:


  threshold: 0.5



  metrics:

    - dice

    - sensitivity

    - specificity

    - accuracy

    - auc

    - cldice

    - thin_vessel_dice



  thin_vessel_analysis:

    enabled: true

    skeletonization: true

    width_threshold_pixels: 3



  save_predictions: true



  prediction_directory:

    "/content/MV-TransUNet/experiments/DRIVE_official_test_predictions"





# ============================================================
# EXPERIMENT MANAGEMENT
# ============================================================

experiment:


  name:

    "MVTransUNet_DRIVE_Official_Experiment_C"



  output_directory:

    "/content/MV-TransUNet/experiments/DRIVE_official_experiment_C"



  description: >

    Official DRIVE experiment using 20 training images and
    20 untouched test images. Patch-based learning with
    vessel-centred sampling, hard-negative mining,
    Focal Tversky loss, clDice topology supervision,
    boundary preservation, and deep supervision.