# ============================================================
# MV-TransUNet Configuration File
# Boundary-Aware Hybrid CNN-Vision Transformer
# Retinal Vessel Segmentation Framework
#
# Training Platform:
# Google Colab GPU (Tesla T4)
# ============================================================


# ============================================================
# PROJECT INFORMATION
# ============================================================

project:
  name: "MV-TransUNet"
  version: "1.0"
  task: "retinal_vessel_segmentation"
  description: >
    Boundary-aware hybrid CNN-Vision Transformer framework
    for retinal vessel segmentation with emphasis on thin-vessel
    preservation and cross-dataset robustness.


# ============================================================
# RANDOMNESS AND REPRODUCIBILITY
# ============================================================

seed:
  value: 42
  deterministic: true


# ============================================================
# HARDWARE CONFIGURATION
# ============================================================

hardware:
  device: "cuda"
  gpu_id: 0
  accelerator: "google_colab"
  gpu_type: "Tesla T4"
  mixed_precision: true
  cudnn_benchmark: false


# ============================================================
# DATASET CONFIGURATION
# ============================================================

dataset:
  name: "DRIVE"

  raw_root_dir: "/content/MV-TransUNet/datasets"
  processed_root_dir: "/content/MV-TransUNet/datasets_processed"

  validation_ratio: 0.2
  split_seed: 42

  train_dataset:
    name: "DRIVE"
    image_dir: "/content/MV-TransUNet/datasets_processed/DRIVE/images"
    mask_dir: "/content/MV-TransUNet/datasets_processed/DRIVE/masks"

  validation_dataset:
    name: "DRIVE"
    image_dir: "/content/MV-TransUNet/datasets_processed/DRIVE/images"
    mask_dir: "/content/MV-TransUNet/datasets_processed/DRIVE/masks"

  external_datasets:
    STARE:
      image_dir: "/content/MV-TransUNet/datasets_processed/STARE/images"
      mask_dir: "/content/MV-TransUNet/datasets_processed/STARE/masks"

    CHASE_DB1:
      image_dir: "/content/MV-TransUNet/datasets_processed/CHASE_DB1/images"
      mask_dir: "/content/MV-TransUNet/datasets_processed/CHASE_DB1/masks"

    HRF:
      image_dir: "/content/MV-TransUNet/datasets_processed/HRF/images"
      mask_dir: "/content/MV-TransUNet/datasets_processed/HRF/masks"


# ============================================================
# IMAGE PREPROCESSING
# ============================================================

preprocessing:
  image_size:
    height: 256
    width: 256

  channels: 3

  clahe:
    enabled: true
    clip_limit: 2.0
    tile_grid_size: 8

  normalization:
    enabled: true

    mean:
      - 0.485
      - 0.456
      - 0.406

    std:
      - 0.229
      - 0.224
      - 0.225


# ============================================================
# DATA AUGMENTATION
# ============================================================

augmentation:
  enabled: true

  horizontal_flip:
    enabled: true
    probability: 0.5

  vertical_flip:
    enabled: true
    probability: 0.5

  rotation:
    enabled: true
    limit: 30
    probability: 0.5

  elastic_transform:
    enabled: true
    alpha: 120
    sigma: 6
    probability: 0.3

  brightness_contrast:
    enabled: true
    probability: 0.5


# ============================================================
# DATALOADER CONFIGURATION
# ============================================================

dataloader:
  batch_size: 8
  num_workers: 2
  pin_memory: true
  shuffle: true
  drop_last: false
  persistent_workers: false


# ============================================================
# MODEL CONFIGURATION
# ============================================================

model:
  name: "MV-TransUNet"

  input_channels: 3
  output_channels: 1

  backbone:
    encoder: "resnet50"
    pretrained: true

  transformer:
    name: "ViT-B_16"
    image_size: 256
    patch_size: 16
    embed_dim: 768
    depth: 12
    heads: 12
    mlp_dim: 3072
    dropout: 0.1

  vessel_attention:
    enabled: true
    reduction_ratio: 16

  decoder:
    type: "multi_scale_progressive"
    boundary_attention: true
    use_skip_connections: true

    channels:
      - 512
      - 256
      - 128
      - 64

  deep_supervision:
    enabled: true

# ============================================================
# LOSS CONFIGURATION
# ============================================================

loss:
  name: "MVTransUNetLoss"

  alpha: 0.4
  beta: 0.4
  gamma: 0.2
   
  bce_weight: 0.4
  dice_weight: 0.4
  boundary_weight: 0.2

  boundary_loss:
    type: "laplacian_boundary"
    kernel_size: 3

    auxiliary_weights:
    - 0.10
    - 0.20
    - 0.30


# ============================================================
# OPTIMIZER CONFIGURATION
# ============================================================

optimizer:
  name: "AdamW"
  learning_rate: 0.0001
  weight_decay: 0.0001

  betas:
    - 0.9
    - 0.999

  epsilon: 0.00000001


# ============================================================
# LEARNING RATE SCHEDULER
# ============================================================

scheduler:
  name: "CosineAnnealingLR"
  min_lr: 0.000001


# ============================================================
# TRAINING CONFIGURATION
# ============================================================

training:
  epochs: 150

  gradient_accumulation_steps: 1

  gradient_clipping:
    enabled: true
    max_norm: 1.0

  early_stopping:
    enabled: true
    patience: 20


# ============================================================
# VALIDATION CONFIGURATION
# ============================================================

validation:
  frequency: 1

  metric:
    name: "dice"
    mode: "max"

  threshold: 0.5


# ============================================================
# CHECKPOINT CONFIGURATION
# ============================================================

checkpoint:
  directory:  "/content/MV-TransUNet/checkpoints/drive_deep_supervision"

  resume: false

  save_last: true
  save_best: true
  save_best_only: false

  best_model_name: "best_model.pth"
  last_model_name: "last_model.pth"


# ============================================================
# LOGGING CONFIGURATION
# ============================================================

logging:
  directory: "/content/MV-TransUNet/logs/drive_deep_supervision"

  tensorboard:
    enabled: true

  log_learning_rate: true
  log_loss_components: true


# ============================================================
# EVALUATION CONFIGURATION
# ============================================================

evaluation:
  threshold: 0.5

  metrics:
    - dice
    - sensitivity
    - specificity
    - accuracy
    - auc
    - thin_vessel_dice

  thin_vessel_analysis:
    enabled: true
    skeletonization: true
    width_threshold_pixels: 3

  save_predictions: true

  prediction_directory: >
    /content/MV-TransUNet/experiments/drive_corrected_baseline/predictions


# ============================================================
# EXPERIMENT MANAGEMENT
# ============================================================

experiment:
  name: "MVTransUNet_DRIVE_Corrected_Baseline"

  output_directory: >
    /content/MV-TransUNet/experiments/drive_corrected_baseline

  description: >
    Corrected DRIVE baseline using the official 20-image training set,
    a fixed 80/20 train-validation split, batch size 8, no gradient
    accumulation, mixed precision, and boundary-aware joint loss.