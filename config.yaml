# ============================================================
# MV-TransUNet Configuration File
# Boundary-Aware Hybrid CNN-Vision Transformer
# Retinal Vessel Segmentation Framework
#
# Training Platform:
# Google Colab GPU (Tesla T4)
# ============================================================


# ============================================================
# PROJECT INFORMATION
# ============================================================

project:

  name: "MV-TransUNet"

  version: "1.0"

  task: "retinal_vessel_segmentation"

  description: >
    Boundary-aware hybrid CNN-Vision Transformer framework
    for retinal vessel segmentation with emphasis on
    thin vessel preservation and cross-dataset robustness.



# ============================================================
# RANDOM SEED
# ============================================================

seed:

  value: 42



# ============================================================
# HARDWARE CONFIGURATION
# ============================================================

hardware:

  device: "cuda"

  mixed_precision: true

  cudnn_benchmark: true



# ============================================================
# DATASET CONFIGURATION
# ============================================================

dataset:


  name: "MultiDataset"


  raw_root_dir:

    "/content/MV-TransUNet/datasets"



  processed_root_dir:

    "/content/MV-TransUNet/datasets_processed"



  # -------------------------
  # Training Dataset
  # -------------------------

  train_dataset:


    name: "DRIVE"


    image_dir:

      "/content/MV-TransUNet/datasets_processed/DRIVE/images"


    mask_dir:

      "/content/MV-TransUNet/datasets_processed/DRIVE/masks"



  # -------------------------
  # Validation Dataset
  # -------------------------

  validation_dataset:


    name: "DRIVE"


    image_dir:

      "/content/MV-TransUNet/datasets_processed/DRIVE/images"


    mask_dir:

      "/content/MV-TransUNet/datasets_processed/DRIVE/masks"



  # -------------------------
  # Additional datasets
  # Used for cross dataset testing
  # -------------------------

  external_datasets:


    STARE:

      image_dir:

        "/content/MV-TransUNet/datasets_processed/STARE/images"


      mask_dir:

        "/content/MV-TransUNet/datasets_processed/STARE/masks"



    CHASE_DB1:

      image_dir:

        "/content/MV-TransUNet/datasets_processed/CHASE_DB1/images"


      mask_dir:

        "/content/MV-TransUNet/datasets_processed/CHASE_DB1/masks"



    HRF:

      image_dir:

        "/content/MV-TransUNet/datasets_processed/HRF/images"


      mask_dir:

        "/content/MV-TransUNet/datasets_processed/HRF/masks"





# ============================================================
# PREPROCESSING
# ============================================================

preprocessing:


  image_size:

    height: 256

    width: 256



  clahe:

    enabled: true

    clip_limit: 2.0

    tile_grid_size: 8



  normalization:


    mean:

      - 0.485

      - 0.456

      - 0.406


    std:

      - 0.229

      - 0.224

      - 0.225
      # ============================================================
# DATALOADER CONFIGURATION
# ============================================================

dataloader:


  batch_size: 4


  num_workers: 2


  pin_memory: true


  shuffle: true



# ============================================================
# AUGMENTATION CONFIGURATION
# ============================================================

augmentation:


  horizontal_flip:

    enabled: true

    probability: 0.5



  vertical_flip:

    enabled: true

    probability: 0.5



  rotation:

    enabled: true

    limit: 30

    probability: 0.5



  elastic_transform:

    enabled: true

    alpha: 120

    sigma: 6

    probability: 0.3



  brightness_contrast:

    enabled: true

    probability: 0.5





# ============================================================
# MODEL CONFIGURATION
# ============================================================

model:


  name:

    "MV-TransUNet"



  backbone:


    encoder:

      "resnet50"



    pretrained:

      true



  transformer:


    embed_dim:

      768


    depth:

      12


    heads:

      12



  decoder:


    boundary_attention:

      true



  output_channels:

    1





# ============================================================
# LOSS CONFIGURATION
# ============================================================

loss:


  name:

    "BoundaryAwareLoss"



  bce_weight:

    1.0



  dice_weight:

    1.0



  boundary_weight:

    0.5





# ============================================================
# OPTIMIZER CONFIGURATION
# ============================================================

optimizer:


  name:

    "AdamW"



  learning_rate:

    0.0001



  weight_decay:

    0.0001



  betas:

    - 0.9

    - 0.999





# ============================================================
# LEARNING RATE SCHEDULER
# ============================================================

scheduler:


  name:

    "CosineAnnealingLR"



  min_lr:

    0.000001





# ============================================================
# TRAINING CONFIGURATION
# ============================================================

training:


  epochs:

    100



  gradient_accumulation_steps:

    1



  early_stopping:


    enabled:

      true



    patience:

      20





# ============================================================
# CHECKPOINT CONFIGURATION
# ============================================================

checkpoint:


  directory:

    "./checkpoints/drive_corrected_baseline"



  save_best_only:

    true





# ============================================================
# LOGGING CONFIGURATION
# ============================================================

logging:


  directory:

    "/content/MV-TransUNet/logs"



  tensorboard:

    enabled:

      true





# ============================================================
# EVALUATION CONFIGURATION
# ============================================================

evaluation:


  metrics:


    - dice

    - sensitivity

    - specificity

    - accuracy

    - auc

    - thin_vessel_dice



  threshold:

    0.5



  save_predictions:

    true



  prediction_directory:


    "/content/MV-TransUNet/experiments/predictions"





# ============================================================
# EXPERIMENT MANAGEMENT
# ============================================================

experiment:


  name:

    "MV-TransUNet_T4_training"



  output_directory:


    "/content/MV-TransUNet/experiments"
