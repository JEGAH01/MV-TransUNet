# ============================================================
# MV-TransUNet Configuration File
# Boundary-Aware Hybrid CNN-Vision Transformer
# Retinal Vessel Segmentation Framework
#
# Training Platform:
# Google Colab GPU (T4/L4/A100)
#
# ============================================================


# ============================================================
# PROJECT INFORMATION
# ============================================================

project:

  name: "MV-TransUNet"

  version: "1.0"

  task: "retinal_vessel_segmentation"

  description: >
    Boundary-aware hybrid ResNet50 Vision Transformer
    framework for multi-scale retinal vessel segmentation.



# ============================================================
# REPRODUCIBILITY
# ============================================================

seed:

  value: 42

  deterministic: true



# ============================================================
# HARDWARE CONFIGURATION
# ============================================================

hardware:

  device: "cuda"

  gpu_id: 0

  accelerator: "google_colab"

  gpu_type: "T4/L4/A100"

  mixed_precision: true

  cudnn_benchmark: true



# ============================================================
# DATASET CONFIGURATION
# ============================================================

dataset:


  name: "DRIVE"


  # Raw Kaggle datasets

  raw_root_dir: "./datasets"



  # Generated by prepare_datasets.py

  processed_root_dir: "./datasets_processed"



  # ===============================
  # Training Dataset
  # ===============================


  train_dataset:


    name: "DRIVE"


    image_dir:

      "./datasets_processed/DRIVE/images"


    mask_dir:

      "./datasets_processed/DRIVE/masks"




  # ===============================
  # Validation Dataset
  # ===============================


  validation_dataset:


    name: "DRIVE"


    image_dir:

      "./datasets_processed/DRIVE/test_images"


    mask_dir:

      "./datasets_processed/DRIVE/test_masks"





  # ===============================
  # Cross Dataset Testing
  # ===============================


  cross_dataset_testing:


    enabled: true


    datasets:



      - name: "STARE"


        image_dir:

          "./datasets_processed/STARE/images"


        mask_dir:

          "./datasets_processed/STARE/masks"





      - name: "CHASE_DB1"


        image_dir:

          "./datasets_processed/CHASE_DB1/images"


        mask_dir:

          "./datasets_processed/CHASE_DB1/masks"





      - name: "HRF"


        image_dir:

          "./datasets_processed/HRF/images"


        mask_dir:

          "./datasets_processed/HRF/masks"





# ============================================================
# IMAGE PREPROCESSING
# ============================================================

preprocessing:


  image_size:


    height: 256

    width: 256



  channels: 3



  normalization:


    enabled: true



    mean:


      - 0.485

      - 0.456

      - 0.406



    std:


      - 0.229

      - 0.224

      - 0.225





  clahe:


    enabled: true


    clip_limit: 2.0


    tile_grid_size: 8





# ============================================================
# DATA AUGMENTATION
# ============================================================

augmentation:


  enabled: true



  horizontal_flip:


    probability: 0.5



  vertical_flip:


    probability: 0.5



  rotation:


    enabled: true


    limit: 30



  elastic_transform:


    enabled: true


    alpha: 120


    sigma: 6



  brightness_contrast:


    enabled: true


    probability: 0.5





# ============================================================
# DATALOADER
# ============================================================

dataloader:


  # Google Colab T4 friendly

  batch_size: 8


  num_workers: 2


  pin_memory: true


  shuffle: true





# ============================================================
# MODEL CONFIGURATION
# ============================================================

model:


  name: "MV-TransUNet"



  input_channels: 3



  output_channels: 1





  # Hybrid CNN + Transformer Encoder


  backbone:



    cnn:


      name: "ResNet50"


      pretrained: true






    transformer:



      name: "ViT-B_16"



      image_size: 256



      patch_size: 16



      hidden_dim: 768



      depth: 12



      heads: 12



      mlp_dim: 3072



      dropout: 0.1





  # Vessel Attention Module


  vessel_attention:


    enabled: true


    reduction_ratio: 16





  # Multi-scale Decoder


  decoder:


    type: "multi_scale_progressive"



    channels:


      - 512

      - 256

      - 128

      - 64



    use_skip_connections: true





# ============================================================
# LOSS CONFIGURATION
# ============================================================

loss:


  type:

    "boundary_aware_joint_loss"



  weights:



    bce:


      alpha: 0.4




    dice:


      beta: 0.4




    boundary:


      gamma: 0.2





  boundary_loss:


    type:

      "laplacian_boundary"



    kernel_size: 3





# ============================================================
# OPTIMIZER
# ============================================================

optimizer:


  name: "AdamW"



  learning_rate: 0.0001



  weight_decay: 0.0001



  betas:


    - 0.9

    - 0.999





# ============================================================
# LEARNING RATE SCHEDULER
# ============================================================

scheduler:


  name: "CosineAnnealing"



  epochs: 150



  min_lr: 0.000001





# ============================================================
# TRAINING
# ============================================================

training:


  epochs: 150



  gradient_accumulation_steps: 4



  gradient_clipping:



    enabled: true



    max_norm: 1.0





  early_stopping:



    enabled: true



    patience: 30





# ============================================================
# VALIDATION
# ============================================================

validation:


  frequency: 1



  save_best_model: true



  metric:


    name: "dice"



    mode: "max"





# ============================================================
# CHECKPOINTS
# ============================================================

checkpoint:


  directory:

    "./checkpoints"



  save_last: true



  save_best: true





# ============================================================
# LOGGING
# ============================================================

logging:


  directory:

    "./logs"



  tensorboard:


    enabled: true





# ============================================================
# EVALUATION
# ============================================================

evaluation:


  metrics:


    - dice

    - sensitivity

    - specificity

    - accuracy

    - auc



  thin_vessel_analysis:



    enabled: true



    skeletonization: true



    width_threshold_pixels: 3





# ============================================================
# EXPERIMENT MANAGEMENT
# ============================================================

experiment:



  name:

    "MVTransUNet_DRIVE_FULL_EXPERIMENT"



  save_predictions: true



  prediction_directory:

    "./experiments/predictions"